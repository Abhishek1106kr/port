name: CI/CD — Build & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── 1. Lint & Type-check ──────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ── 2. Build & Deploy ─────────────────────────────────────────────────
  # Combines build + deploy to avoid rebuilding twice.
  # On PRs: only builds (no deploy). On main push: builds + deploys.
  deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          # Sets basePath to /port for GitHub Pages — triggers static export mode
          NEXT_PUBLIC_BASE_PATH: /port

      - name: Setup GitHub Pages
        # enablement: true auto-enables Pages on first run if not yet enabled
        uses: actions/configure-pages@v4
        if: github.event_name == 'push'
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push'
        with:
          path: out/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: github.event_name == 'push'
